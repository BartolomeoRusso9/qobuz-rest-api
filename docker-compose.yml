services:
  web:
    build: .
    env_file:
      - .env
    ports:
      # Bind to localhost only by default. Change to "0.0.0.0:8000:8000"
      # ONLY if you also set API_KEY in .env and understand the exposure.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./downloads:/app/downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
networks:
  default:
    driver: bridge
